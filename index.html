<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر النصوص الذكي</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #e9ecef;
            --paper: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* شريط الأدوات العلوي */
        .header-tool {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .file-info input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 16px;
            width: 250px;
        }

        .actions button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .toolbar {
            width: 100%;
            background: white;
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-bottom: 1px solid #ccc;
            flex-wrap: wrap;
        }

        /* منطقة الورقة */
        .paper-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        #editor {
            width: 210mm; /* عرض A4 */
            min-height: 297mm;
            background: var(--paper);
            padding: 2cm;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            outline: none;
            font-size: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        /* شريط الإحصائيات */
        .stats-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
        }

        /* حل مشكلة الطباعة والـ PDF */
        @media print {
            body { background: white; }
            .header-tool, .toolbar, .stats-bar, #fileInput { display: none !important; }
            .paper-container { padding: 0; margin: 0; }
            #editor {
                box-shadow: none;
                width: 100%;
                padding: 0;
                margin: 0;
                min-height: auto;
            }
            /* إجبار المتصفح على تقسيم الصفحات بشكل صحيح */
            p, div { page-break-inside: avoid; }
        }

        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header-tool">
        <div class="file-info">
            <input type="text" id="fileName" value="مستند جديد" placeholder="اسم الملف...">
        </div>
        <div class="actions">
            <input type="file" id="fileInput" hidden accept=".txt" onchange="importFile(event)">
            <button onclick="document.getElementById('fileInput').click()">فتح ملف نصي</button>
            <button onclick="saveAsTxt()" style="background: #27ae60;">حفظ كـ Text</button>
            <button onclick="exportPDF()" style="background: #e74c3c;">تصدير PDF</button>
        </div>
    </div>

    <div class="toolbar">
        <button onclick="execCmd('bold')"><b>B</b></button>
        <button onclick="execCmd('italic')"><i>I</i></button>
        <button onclick="changeFontSize('increase')">A+</button>
        <button onclick="changeFontSize('decrease')">A-</button>
        <select onchange="execCmd('fontName', this.value)">
            <option value="Arial">Arial</option>
            <option value="Tahoma">Tahoma</option>
            <option value="Times New Roman">Times New Roman</option>
        </select>
    </div>

    <div class="paper-container">
        <div id="editor" contenteditable="true" oninput="updateStats()">
            ابدأ بكتابة قصتك هنا...
        </div>
    </div>

    <div class="stats-bar">
        الكلمات: <span id="word-count">0</span> | 
        الصفحات: <span id="page-count">1</span>
    </div>

    <script>
        const editor = document.getElementById('editor');
        let fontSize = 18;

        function execCmd(cmd, val = null) {
            document.execCommand(cmd, false, val);
        }

        function changeFontSize(type) {
            fontSize = type === 'increase' ? fontSize + 2 : fontSize - 2;
            editor.style.fontSize = fontSize + 'px';
        }

        function updateStats() {
            const text = editor.innerText.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('word-count').innerText = words;
            
            // حساب الصفحات بناءً على ارتفاع المحتوى الفعلي
            const pages = Math.max(1, Math.ceil(editor.scrollHeight / 1122)); // 1122px هو ارتفاع A4 تقريباً
            document.getElementById('page-count').innerText = pages;
        }

        // حفظ كملف نصي .txt
        function saveAsTxt() {
            const text = editor.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = document.getElementById('fileName').value + ".txt";
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }

        // استيراد ملف نصي
        function importFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    editor.innerText = e.target.result;
                    document.getElementById('fileName').value = file.name.replace('.txt', '');
                    updateStats();
                };
                reader.readAsText(file);
            }
        }

        // تصدير PDF (باستخدام محرك الطباعة لضمان الجودة)
        function exportPDF() {
            const originalTitle = document.title;
            document.title = document.getElementById('fileName').value;
            window.print();
            document.title = originalTitle;
        }

        // تنبيه بخصوص الـ PDF
        console.log("نصيحة: لاستيراد PDF وتعديله، يفضل تحويله لـ Word ثم نسخه هنا، لأن المتصفحات لا تدعم تعديل الـ PDF مباشرة برمجياً.");
    </script>
</body>
</html>
